# Build & test gate for pushes to master and every pull request.
#
# What it does NOT run: the @Tag("stress") 10k-record suites (excluded with
# -PskipStress) and the @Tag("benchmark") micro-benchmarks (already opt-in via
# -PrunBenchmark, so they stay off by default). Everything else runs, including
# the SQL/Mongo integration suites against real database servers.
#
# Database servers: the three integration databases are brought up from the
# repo's own docker-compose.yml (the single source of truth shared with local
# dev). They are started here explicitly with `--wait` so the job blocks until
# each container is healthy -- this is what lets the MongoDB single-node replica
# set finish electing a PRIMARY before the tests connect (transactions and
# change streams require it). Because the containers are already up, the Gradle
# build runs with -PnoDocker (it skips the docker-compose plugin wiring but the
# SQL/Mongo suites still connect to the running containers on their default
# host/ports, which match docker-compose.yml).
#
# Dual-target Java: a single JDK 25 toolchain launches Gradle, compiles, and runs
# the tests. Production compileJava emits Java 8 bytecode via the FinalCraft Jabel
# fork (which rides JDK 25's javac), with options.release = 8 keeping the API floor
# honest -- so no separate JDK 17 compiler is needed.

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test (no stress / no benchmark)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A single JDK 25 toolchain compiles (Jabel fork -> Java 8 bytecode), runs the
      # tests, and launches Gradle.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle (dependency + build cache)
        uses: gradle/actions/setup-gradle@v4

      # Brings up MariaDB (39306), PostgreSQL (39307), MongoDB (39308, 1-node replica
      # set), Valkey (39309) and Redis (39310). --wait blocks until every healthcheck
      # passes. The manager-jedis cache-sync suite runs against Valkey and Redis; the
      # SQL/Mongo suites against the others.
      - name: Start integration databases
        run: docker compose up -d --wait

      # `build` = assemble + check across :core, :libby, :manager and :manager-jedis
      # (compile the dual-target production code to Java 8 bytecode, run every test
      # bar stress/benchmark -- including the SQL/Mongo and the Valkey/Redis cache-sync
      # suites -- and the README version-sync check).
      - name: Build & test
        run: |
          ./gradlew build \
            -PskipStress \
            -PnoDocker \
            --stacktrace

      - name: Database logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down databases
        if: always()
        run: docker compose down -v

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
